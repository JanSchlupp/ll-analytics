services:
  - type: web
    name: ll-analytics
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn ll_analytics.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DEFAULT_SEASON
        value: "108"
      - key: DEFAULT_RUNDLE
        value: B_Skyline
